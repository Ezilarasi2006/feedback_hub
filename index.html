<!DOCTYPE html>
<html>
<head>
  <title>Feedback Hub</title>
  <style>
/* 🌟 General Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌈 Background */
body {
  height: 100vh;
  background: linear-gradient(135deg, #b34386, #bd5f8a);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🧊 Glass Card */
.box {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 30px;
  width: 350px;
  border-radius: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-5px) scale(1.02);
}

/* 🏷️ Header */
h1 {
  font-size: 28px;
  margin-bottom: 5px;
}

p {
  font-size: 14px;
  margin-bottom: 15px;
  color: #ddd;
}

/* ✨ Input Fields */
.inputBox {
  position: relative;
  margin: 15px 0;
}

.inputBox input,
.inputBox textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

.inputBox input:focus,
.inputBox textarea:focus {
  background: rgba(255,255,255,0.3);
  box-shadow: 0 0 10px #00c6ff;
}

/* 📝 Floating Labels */
.inputBox label {
  position: absolute;
  left: 12px;
  top: 12px;
  color: #ccc;
  transition: 0.3s;
}

.inputBox input:focus + label,
.inputBox input:valid + label,
.inputBox textarea:focus + label,
.inputBox textarea:valid + label {
  top: -8px;
  font-size: 11px;
  color: #00ffcc;
}

/* 📊 Counter */
#count {
  font-size: 12px;
  text-align: right;
  color: #ccc;
}

/* 😊 Emoji */
.emoji span {
  font-size: 26px;
  margin: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.emoji span:hover {
  transform: scale(1.3);
}

/* ⭐ Stars */
.stars span {
  font-size: 28px;
  cursor: pointer;
  opacity: 0.4;
  transition: 0.3s;
}

.stars span.active,
.stars span:hover {
  opacity: 1;
  transform: scale(1.2);
}

/* 🔘 Button */
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00c6ff;
}

/* 🎉 Success Message */
#msg {
  margin-top: 15px;
  color: #00ffcc;
  font-weight: bold;
  animation: fade 1s;
}

/* ✨ Animation */
@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 📱 Mobile Responsive */
@media(max-width: 400px) {
  .box {
    width: 90%;
    padding: 20px;
  }
}</style>
</head>

<body>

<div class="box">
  <!-- 🎨 Header -->
  <h1>Feedback Hub</h1>
  <p>We value your opinion 💬</p>

  <div class="inputBox">
    <input type="text" id="name" required>
    <label>Name</label>
  </div>

  <div class="inputBox">
    <input type="email" id="email" required>
    <label>Email</label>
  </div>

  <div class="inputBox">
    <textarea id="message" required></textarea>
    <label>Feedback</label>
  </div>

  <!-- 📊 Counter -->
  <p id="count">0/100</p>

  <!-- 😊 Emoji -->
  <div class="emoji">
    <span onclick="setRating(1)">😡</span>
    <span onclick="setRating(2)">😞</span>
    <span onclick="setRating(3)">😐</span>
    <span onclick="setRating(4)">😊</span>
    <span onclick="setRating(5)">😍</span>
  </div>

  <!-- ⭐ Stars -->
  <div class="stars">
    <span onclick="setRating(1)">⭐</span>
    <span onclick="setRating(2)">⭐</span>
    <span onclick="setRating(3)">⭐</span>
    <span onclick="setRating(4)">⭐</span>
    <span onclick="setRating(5)">⭐</span>
  </div>

  <input type="hidden" id="rating">

  <button id="submitBtn">Submit</button>

  <p id="msg"></p>
</div>

<script type="module" src="script.js"></script>

<script>
  function setRating(value) {
    document.getElementById("rating").value = value;

    const stars = document.querySelectorAll(".stars span");
    stars.forEach((star, index) => {
      star.classList.toggle("active", index < value);
    });
  }

  const message = document.getElementById("message");
  const count = document.getElementById("count");

  message.addEventListener("input", () => {
    count.innerText = message.value.length + "/100";
  });
</script>

</body>
</html>
