<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #d05bb1, #c56b9e);
      padding: 20px;
      color: white;
    }

    h2 {
      text-align: center;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
      margin: 5px;
    }

    input {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 200px;
    }

    #list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      width: 280px;
      border-radius: 15px;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<!-- 🔐 LOGIN FIRST -->
<div id="loginBox" style="text-align:center; margin:20px;">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<!-- 🔒 MAIN PANEL (HIDDEN FIRST) -->
<div id="mainPanel" style="display:none;">

  <div class="top">
    <div class="box">Total: <span id="total">0</span></div>
    <div class="box">Average Rating: <span id="avg">0</span> ⭐</div>
    <input type="text" id="search" placeholder="Search name">
  </div>

  <div id="list"></div>

</div>

<script type="module" src="admin.js"></script>

</body>

</body>
</html>
